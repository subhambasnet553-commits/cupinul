<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" href="favicon-180.png">
    <meta charset="UTF-8" />
    <title>Verify Your Email</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="login_page">
      <p class="title">Verify Your Email</p>
      <p class="onboarding-sub" id="otpSubtitle">Enter the 6-digit code we sent you.</p>

      <div>
        <input type="text" id="otpInput" class="password otp-input" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
      </div>

      <p id="otpError" class="error-text" style="display:none;"></p>

      <button id="verifyBtn" class="cacc">Verify</button>

      <p class="back">
        Didn't get it? <a href="#" id="resendLink">Resend code</a>
      </p>
    </div>

    <script src="decor.js"></script>
    <script src="verify-otp.js"></script>
  </body>
</html>
