<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" href="favicon-180.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e6437e">
    <meta charset="UTF-8" />
    <title>Our Gallery</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <button class="profile-btn" id="profileBtn" title="Profile"><i class='bx bxs-user-circle'></i></button>

    <div class="diary_page gallery-page" id="app">
      <div id="loadingState">
        <p class="title">Loading...</p>
      </div>

      <div id="gallerySection" style="display:none;">
        <a href="home.html" class="back-link"><i class='bx bx-arrow-back'></i> Home</a>
        <p class="title">Our Gallery</p>

        <button id="addPhotoBtn" class="cacc entry-submit-btn"><i class='bx bx-image-add'></i> Add a Photo</button>

        <div id="uploadForm" class="write-box" style="display:none;">
          <label class="profile-label">Photo</label>
          <label for="photoInput" class="gallery-upload-btn"><i class='bx bx-upload'></i> Choose a Photo</label>
          <input type="file" id="photoInput" accept="image/*" style="display:none;">
          <img id="photoPreview" class="gallery-upload-preview" style="display:none;" />

          <label class="profile-label">Event Name</label>
          <input type="text" id="eventNameInput" class="pair-input event-input" placeholder="e.g. Our first date, Beach trip...">

          <label class="profile-label">Date</label>
          <input type="date" id="eventDateInput" class="pair-input event-input">

          <button id="submitPhotoBtn" class="cacc entry-submit-btn">Save to Gallery</button>
          <p id="uploadMsg" class="write-msg" style="display:none;"></p>
        </div>

        <div id="photoGrid" class="photo-grid"></div>
      </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" style="display:none;">
      <button id="lightboxClose" class="lightbox-close"><i class='bx bx-x'></i></button>
      <img id="lightboxImg" class="lightbox-img" />
      <p id="lightboxCaption" class="lightbox-caption"></p>
      <button id="lightboxDelete" class="danger-btn lightbox-delete" style="display:none;"><i class='bx bx-trash'></i> Delete Photo</button>
    </div>

    <script src="decor.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="profile.js"></script>
    <script src="gallery.js"></script>
  </body>
</html>
