<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

          fill="none"
          pathLength="100"
        />

      <p class="splash-title" id="splashTitle">CUPINUL</p>
      <p class="splash-tagline" id="splashTagline">where love writes itself</p>
      <p class="splash-skip" id="splashSkip">tap anywhere to skip</p>

    <script src="decor.js"></script>
    <script src="splash.js"></script>
