<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" href="favicon-180.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e6437e">
    <title>Community</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
  </head>
  <body>

    <button class="profile-btn" id="profileBtn" title="Profile"><i class='bx bxs-user-circle'></i></button>

    <div class="diary_page community-page" id="app">
      <div id="loadingState">
        <p class="title">Loading...</p>
      </div>

      <div id="communitySection" style="display:none;">
        <a href="home.html" class="back-link"><i class='bx bx-arrow-back'></i> Home</a>
        <p class="title">Community</p>
        <p class="subtitle">Share stories and thoughts with everyone on Cupinul</p>

        <div id="postsList" class="community-posts-list"></div>

        <div id="postImagePreviewWrap" style="display:none;">
          <img id="postImagePreview" class="post-image-preview-compose">
          <button type="button" id="removePostImageBtn" class="post-image-remove-btn"><i class='bx bx-x'></i></button>
        </div>
        <form id="postForm" class="message-form">
          <label for="postImageInput" class="message-attach-btn"><i class='bx bx-image-add'></i></label>
          <input type="file" id="postImageInput" accept="image/*" style="display:none;">
          <input type="text" id="postInput" class="message-input" maxlength="2000" placeholder="Share a story or thought..." autocomplete="off">
          <button type="submit" class="message-send-btn"><i class='bx bx-send'></i></button>
        </form>
        <p id="postMsg" class="write-msg" style="display:none;"></p>
      </div>
    </div>

    <!-- Comments panel -->
    <div id="commentsOverlay" class="profile-overlay"></div>
    <div id="commentsPanel" class="profile-panel comments-panel">
      <button id="commentsCloseBtn" class="profile-close-btn"><i class='bx bx-x'></i></button>
      <p class="title" style="font-size:20px;">Comments</p>
      <div id="commentsList" class="entries-list"></div>
      <div class="comment-input-row">
        <input type="text" id="commentInput" class="message-input" placeholder="Write a comment...">
        <button id="commentSendBtn" class="message-send-btn"><i class='bx bx-send'></i></button>
      </div>
    </div>

 <!-- Public profile view -->
    <div id="userProfileOverlay" class="profile-overlay"></div>
    <div id="userProfilePanel" class="user-profile-modal">
      <span id="upNewBadge" class="up-new-badge" style="display:none;"><i class='bx bxs-star'></i> New</span>
      <button id="userProfileCloseBtn" class="profile-close-btn"><i class='bx bx-x'></i></button>

      <div class="user-profile-content">
        <div class="up-avatar-wrap">
          <img id="upAvatar" class="up-avatar-big" style="display:none;">
          <div id="upAvatarPlaceholder" class="up-avatar-big up-avatar-placeholder-big"><i class='bx bxs-user-circle'></i></div>
        </div>

        <p class="up-name-big">
          <span id="upName"></span>
          <i id="upVerifiedBadge" class='bx bxs-check-circle up-verified-badge' style="display:none;" title="Premium member"></i>
        </p>
        <p class="up-handle" id="upHandle"></p>

        <div id="upPairedPill" class="up-paired-pill" style="display:none;">
          <i class='bx bxs-heart'></i> Paired with <b id="upPartnerNamePill"></b>
        </div>

        <div class="up-stats-grid">
          <div class="up-stat-box">
            <i class='bx bxs-calendar-heart'></i>
            <p class="up-stat-label">Together since</p>
            <p class="up-stat-value" id="upSince">—</p>
          </div>
          <div class="up-stat-box">
            <i class='bx bxs-group'></i>
            <p class="up-stat-label">Followers</p>
            <p class="up-stat-value" id="upFollowers">0</p>
          </div>
          <div class="up-stat-box">
            <i class='bx bxs-magic-wand'></i>
            <p class="up-stat-label">About me</p>
            <p class="up-stat-value up-stat-bio" id="upBio">—</p>
          </div>
        </div>

        <div class="user-profile-actions-stacked">
          <button id="upFollowBtn" class="up-follow-btn">Follow</button>
          <button id="upMessageBtn" class="up-message-btn"><i class='bx bx-message-rounded'></i> Message</button>
        </div>
      </div>
    </div>

    <script src="decor.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="profile.js"></script>
    <script src="community.js"></script>
  </body>
</html>
