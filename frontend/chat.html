<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" href="favicon-180.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e6437e">
    <title>Chat</title>
    <script src="theme.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
  </head>
  <body>

    <button class="profile-btn" id="profileBtn" title="Profile"><i class='bx bxs-user-circle'></i></button>

    <div class="diary_page chat-page" id="app">
      <div id="loadingState">
        <p class="title">Loading...</p>
      </div>

      <div id="chatSection" style="display:none;">
        <div class="chat-header-card">
          <a href="messages.html" class="chat-back-btn"><i class='bx bx-arrow-left'></i></a>
          <div class="chat-header-center">
            <div class="chat-header-avatar-wrap">
              <img id="chatPartnerAvatar" class="chat-header-avatar" style="display:none;">
              <div id="chatPartnerAvatarPlaceholder" class="chat-header-avatar chat-header-avatar-placeholder"><i class='bx bxs-user-circle'></i></div>
              <span id="chatOnlineDot" class="chat-online-dot" style="display:none;"></span>
            </div>
            <p class="chat-header-name" id="chatPartnerName">Chat</p>
            <p class="chat-header-status" id="chatStatusText"></p>
          </div>
          <div class="chat-header-spacer"></div>
        </div>
        <p class="chat-encrypted-note"><i class='bx bx-lock-alt'></i> Messages are end-to-end encrypted</p>

        <div id="messagesList" class="messages-list"></div>

        <form id="messageForm" class="chat-input-bar">
          <span class="chat-input-icon"><i class='bx bx-smile'></i></span>
          <input type="text" id="messageInput" class="chat-input-field" placeholder="Type a message..." autocomplete="off">
          <span class="chat-input-icon"><i class='bx bx-paperclip'></i></span>
          <button type="submit" class="chat-input-send"><i class='bx bx-send'></i></button>
        </form>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="decor.js"></script>
    <script src="profile.js"></script>
    <script src="chat.js"></script>
  </body>
</html>
