<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" href="favicon-180.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e6437e">
    <meta charset="UTF-8" />
    <title>Cupinul - Create Account</title>
    <script src="theme.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="login_page">
      <form id="registerForm">

    <p class="title">Create Account</p>

    <input
        type="text"
        placeholder="First Name"
        required
        class="firstname"
        id="firstName">

    <input
        type="text"
        placeholder="Last Name"
        required
        class="lastname"
        id="lastName">

    <input
        type="email"
        placeholder="Email"
        required
        class="email"
        id="email">

    <input
        type="password"
        placeholder="Password"
        required
        class="password"
        id="password">

    <input
        type="password"
        placeholder="Confirm Password"
        required
        class="conpassword"
        id="confirmPassword">

    <p id="errorMsg"></p>

    <button type="submit" class="cacc">
        Create Account
    </button>

    <p class="back">
        Already have an account?
        <a href="structure.html">Login!</a>
    </p>

</form>
      <div class="legal-footer-links">
        <a href="terms.html">Terms</a>·<a href="privacy.html">Privacy</a>·<a href="copyright.html">Copyright</a>
      </div>
    </div>

    <script src="decor.js"></script>
    <script src="script.js"></script>
  </body>
</html>
